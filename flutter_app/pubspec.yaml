name: crisis_response_app
description: Crisis Response & Emergency Coordination App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.3

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  flutter_secure_storage: ^10.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Maps
  google_maps_flutter: ^2.14.2
  geolocator: ^11.1.0

  # Notifications
  flutter_local_notifications: ^17.2.4

  # BLE Mesh
  nearby_connections: ^4.3.0

  # Device info
  battery_plus: ^6.2.3
  connectivity_plus: ^6.1.5

  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.68.0

  # Permissions
  permission_handler: ^11.4.0

  # Text to Speech / Speech to Text
  flutter_tts: ^4.0.2
  speech_to_text: ^7.0.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.5
  share_plus: ^12.0.2
  uuid: ^4.4.0

  # Gemini AI
  google_generative_ai: ^0.4.3

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true